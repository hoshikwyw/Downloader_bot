# Self-hosted Telegram Bot API server (M4) — raises the bot send limit to 2 GB.
#
# Usage:
#   1. Get api_id / api_hash from https://my.telegram.org -> API development tools
#   2. Put TELEGRAM_API_ID and TELEGRAM_API_HASH in your .env
#   3. docker compose up -d
#   4. Set LOCAL_API_BASE=http://localhost:8081 in .env and restart the bot
#
# Note: a bot must be "logged out" of the cloud API once before it can move to a
# local server. If sending fails with a migration error, run this once:
#   curl "https://api.telegram.org/bot<YOUR_TOKEN>/logOut"
# then start this server and the bot again.

services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: 1            # enable --local mode (large files, local paths)
    ports:
      - "8081:8081"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api

volumes:
  telegram-bot-api-data:
